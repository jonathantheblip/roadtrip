<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family Trips — Rafa · Where's my family?</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { height: 100%; }
  body { background: radial-gradient(120% 120% at 50% 0%, #2a2622, #14110e 70%); font-family: "Fredoka", system-ui, sans-serif; min-height: 100vh; overflow: auto; }
  .ft-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .ft-scroll { scrollbar-width: none; }
  @keyframes ftBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes ftFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ftBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes ftPing { 0% { transform: scale(0.9); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; } }
  #scaler { transform-origin: top center; }
  .lbl { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.42); }
</style>
</head>
<body>
  <div id="scaler"><div id="root"></div></div>

  <script type="text/babel" src="src/ft2/system.jsx"></script>
  <script type="text/babel" src="src/ft2/rafa.jsx"></script>
  <script type="text/babel" src="src/ft2/rafa-whosaround.jsx"></script>
  <script type="text/babel">
    const PADW = 760, PADH = 560;
    function Stage() {
      return (
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'center', gap: 64, padding: '52px 40px 70px' }}>
          {/* PHONE HOME */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 18 }}>
            <div className="lbl">Rafa's phone · home</div>
            <Phone traveler="rafa" time="4:21"><RWHome /></Phone>
          </div>

          {/* iPAD NOTE */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 18, maxWidth: PADW }}>
            <div className="lbl">…and on the iPad Adventure Map</div>
            <div style={{ width: PADW, height: PADH, borderRadius: 26, position: 'relative', background: '#1a1a1d', padding: 14, boxShadow: '0 40px 100px rgba(0,0,0,0.5), 0 0 0 2px #2c2c30' }}>
              <div style={{ position: 'absolute', top: 7, left: '50%', transform: 'translateX(-50%)', width: 6, height: 6, borderRadius: '50%', background: '#000' }} />
              <div style={{ width: '100%', height: '100%', borderRadius: 16, overflow: 'hidden', position: 'relative' }}>
                <RWMapFamily />
              </div>
            </div>
            <div style={{ maxWidth: PADW, color: 'rgba(255,243,223,0.85)', fontFamily: '"Fredoka", sans-serif', fontSize: 16, lineHeight: 1.5 }}>
              The same family bubbles ride along his storybook map — <b style={{ color: '#FFC247' }}>Mama &amp; you at the special house</b>, <b style={{ color: '#7AB8E8' }}>Papa out exploring the city</b>, <b style={{ color: '#F08BB8' }}>Sissy resting (💤) further down the road</b>. Live ones bob &amp; glow; tap a face for the same big reveal. No map dot, ever — just <i>who's home</i> and <i>who's out</i>, told in characters.
            </div>
          </div>
        </div>
      );
    }
    function scale() {
      const s = Math.min(window.innerWidth / 1760, 1);
      document.getElementById('scaler').style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', scale);
    ReactDOM.createRoot(document.getElementById('root')).render(<Stage />);
    requestAnimationFrame(scale); setTimeout(scale, 300);
  </script>
</body>
</html>

name = "roadtrip-sync"
main = "src/index.js"
compatibility_date = "2026-04-01"

# Bundle .wasm modules as Cloudflare Workers CompiledWasm imports.
# Required for @cf-wasm/photon (the photo resize/JPEG encoder used
# by /assets/:key?w=<int>).
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# D1: roadtrip-db (uuid set after `wrangler d1 create` or via MCP).
[[d1_databases]]
binding = "DB"
database_name = "roadtrip-db"
database_id = "33bb806c-1c1d-4268-830f-7bad3e49711f"

# R2: roadtrip-assets (created after enabling R2 on the account).
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "roadtrip-assets"

# Non-secret config. Secrets (set via `wrangler secret put`, NOT listed
# here): the 4 FAMILY_TOKEN_* values, GOOGLE_PLACES_API_KEY (geocoding +
# /leave-when + /places/nearby + trip-hero resolution on GET /trips),
# and CALENDAR_IMPORT_TOKEN — a dedicated
# least-privilege bearer the Apple Shortcut uses for POST /calendar/import
# so no family token rides along in the iCloud-distributed Shortcut.
[vars]
ALLOWED_ORIGINS = "https://jonathantheblip.github.io,http://localhost:5173,http://localhost:4173,http://localhost:5180"

# Nightly auto-weave (WEAVE_SCOPE slice 3). 08:00 UTC ≈ 2-4am US overnight —
# after the day's memories have settled. Fires the worker `scheduled` handler
# → runNightlyWeave, which pre-assembles the active trip's freshest day into a
# stored weave so the page is already woven when the family next opens the app.
[triggers]
crons = ["0 8 * * *"]

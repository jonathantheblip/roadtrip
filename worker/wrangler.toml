name = "roadtrip-sync"
main = "src/index.js"
compatibility_date = "2026-04-01"
# @cloudflare/puppeteer (Browser Rendering, for the share Card A) imports
# node:buffer; nodejs_compat enables the Node built-ins it needs. Additive —
# enables node: imports without removing any Web API the worker already uses.
compatibility_flags = ["nodejs_compat"]

# Bundle .wasm modules as Cloudflare Workers CompiledWasm imports.
# Required for @cf-wasm/photon (the photo resize/JPEG encoder used
# by /assets/:key?w=<int>).
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# D1: roadtrip-db (uuid set after `wrangler d1 create` or via MCP).
[[d1_databases]]
binding = "DB"
database_name = "roadtrip-db"
database_id = "33bb806c-1c1d-4268-830f-7bad3e49711f"

# R2: roadtrip-assets (created after enabling R2 on the account).
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "roadtrip-assets"

# Browser Rendering: headless Chromium for the share-out link-preview card
# (Card A — GET /m/:token/card.png renders the 1200×630 card HTML to a PNG).
# Requires Browser Rendering enabled on the account (billed; usage bounded by a
# forever cache — each shared memory renders once). The card route guards on
# `env.BROWSER` and falls back to the raw photo if the binding is absent.
[browser]
binding = "BROWSER"

# Non-secret config. Secrets (set via `wrangler secret put`, NOT listed
# here): the 4 FAMILY_TOKEN_* values, GOOGLE_PLACES_API_KEY (geocoding +
# /leave-when + /places/nearby + trip-hero resolution on GET /trips),
# and CALENDAR_IMPORT_TOKEN — a dedicated
# least-privilege bearer the Apple Shortcut uses for POST /calendar/import
# so no family token rides along in the iCloud-distributed Shortcut.
[vars]
ALLOWED_ORIGINS = "https://jonathantheblip.github.io,http://localhost:5173,http://localhost:4173,http://localhost:5180"
# Vision dimension ENABLED (Jonathan's explicit consent 2026-07-08 to cloud vision +
# spend). 'shadow' = compute + store vision labels for the shadow engine; nothing
# family-visible. A plain var (not sensitive); the backfill is bounded per sweep.
PHOTO_VISION_MODE = "shadow"
PHOTO_VISION_BACKFILL_LIMIT = "90"
# Build 4a promoted (Jonathan's explicit go-ahead, 2026-07-11, after reviewing
# the shadow report: 13 archive-wide stops with a street address but no
# coordinates, zero unmarked-stop overwrites, the Provincetown stacked-places
# case verified live). ITS OWN knob, independent of PHOTO_HEAL_MODE — flipping
# this on does NOT arm v1's photo-moving or the offset-inference engine.
PHOTO_STOP_GEOCODE_MODE = "on"
# W0 per-lever knobs (BUILD_PLAN_WITNESS_FLEET_2.md) — one for each of the
# three remaining healSweep write classes formerly armed only by the master
# PHOTO_HEAL_MODE. Each defaults to INHERITING the caller-resolved global
# mode when unset (photoTzMode/photoOffsetMode/photoGpsPropagationMode's
# fallback behavior — see their headers), so leaving all three unset here is
# a byte-identical no-op vs. today. Promoted one at a time per §R (R1/R2/R3),
# each with its own shadow report and Jonathan's one-line confirm — not set
# here yet.
# PHOTO_TZ_MODE = "shadow"                  # R1 — trip.tz backfill (tripTzBackfill.js)
# PHOTO_OFFSET_MODE = "shadow"              # R2 — offset-inference engine (offsetInference.js)
# PHOTO_GPS_PROPAGATION_MODE = "shadow"     # R3 — moment-scoped GPS propagation (momentGpsPropagation.js)

# ⛔ PHOTO_FACES_MODE (Build W4) — still ships OFF, but the cross-device design
# is now RESOLVED (KEYLESS, 2026-07-14 — BUILD_PLAN_FACES_KEYLESS.md). The old
# per-device `fc_N` numbering (which false-bridged / false-split people across
# devices) is REPLACED by a deterministic `fc2-<hash(personId)>` tag: every
# device computes the SAME tag from the shared family-member id — no key, no
# setup, nothing to reconcile. Sync still ships correct + fail-closed (only
# fc2-shaped tags reach D1, never embeddings/names). The pre-promotion HYGIENE
# slice is now DONE (slice 4, 2026-07-17): a strict CSP forbids all external
# origins AND the ONNX runtime + models are self-hosted same-origin, so no third
# party can serve code/weights to the page that decodes family PHOTOS. ONE gate
# remains before a flip past "off", so DO NOT promote yet: a promotion review of
# coverage (tags only exist where an enrolled device scanned) + a false-positive
# retraction path. There is still no faces "shadow" dry-run (shadow == off here),
# so that must be settled before "on" — nothing catches it live.
# See BUILD_PLAN_FACES_KEYLESS.md + the carryover's faces entry.
# PHOTO_FACES_MODE = "off"                  # R6 — LOCKED pending the coverage/retraction promotion review

# PHOTO_PRESENCE_MODE (Build W5, BUILD_PLAN_WITNESS_FLEET_2.md) — presence
# breadcrumbs: a family member's phone becomes a witness for where an
# unlocated photo belongs. CONSENTED (Jonathan, 2026-07-12, for both adults)
# but NOT YET PROMOTABLE — migration 020 (presence_trail) is written but NOT
# APPLIED to prod D1 (needs the D1-Edit token + Jonathan's explicit
# apply-before-push step, same gate as every prior migration). Leaving this
# UNSET (equivalent to "off") is the load-bearing inertness property: off is
# the ONLY value that guarantees the worker issues ZERO queries against a
# table that doesn't exist yet — see presence.js's photoPresenceMode. Own
# knob, INDEPENDENT (no fallback-inherit from PHOTO_HEAL_MODE, unlike the W0
# levers above). DO NOT set past "off" until migration 020 is applied.
# BEFORE PROMOTING (review 2026-07-13): revisit the family-visible caption
# WhoAround.jsx:163 "Shared only while the app is open." — arguably still
# literally true (the crumb history is engine-only, never re-exposed, and the
# foreground-only SEND cadence is unchanged), but a lay reader may take it to
# mean nothing is kept, which is less clear once a trip+14d server-side history
# can exist. NOT changed here (family-visible copy is a Jonathan/loop-Design
# call, not an autonomous overnight edit); track it as a promotion-gate item.
# PHOTO_PRESENCE_MODE = "off"

# PHOTO_CONFIRM_MODE (Build S1, BUILD_PLAN_WITNESS_FLEET_2.md §W3) — the confirm
# surface's WRITE path: the once-a-day card's confirm / correct / leave-as-guess
# lands in migration 021 (memory_heal_feedback) and, for a confirm/correction,
# fires runHealForTrip so the trip re-settles now. Own knob, INDEPENDENT (its own
# tri-state resolver, confirmFeedback.js's photoConfirmMode). Leaving this UNSET
# (= "off") is the load-bearing inertness property: off is the ONLY value where
# the /heal-confirm route issues ZERO queries against migration 021 — so the
# worker is safe to ship BEFORE 021 is applied to prod D1 (needs the D1-Edit
# token + Jonathan's explicit apply-before-push step, same gate as 020/019/018).
# DO NOT set past "off" until 021 is applied AND the S1 surface is ready to go
# live for the family (Stage 4: 4-lens e2e + a11y + the security red-team green).
# 'shadow' = record the human answer + re-sort the SHADOW ledger without moving
# family photos (the pre-promotion "watch it learn from a real confirm" tool);
# 'on' = the re-heal actually moves photos (still obeying PHOTO_HEAL_MODE).
# PHOTO_CONFIRM_MODE = "off"

# PHOTO_DECISION_ENGINE (Build O2, BUILD_SPECS_GLANCE_ENGINE.md F4) — which engine
# produces the heal decisions. Defaults UNSET (= "off"): the whole Healing Model
# challenger never runs, zero new compute in prod — the load-bearing inertness
# property for this overnight build. "shadow" = the challenger runs on every heal and
# its compact per-decision read rides in memory_heal_decisions.signals_json.hm, but the
# INCUMBENT sessionScorer still fills every SERVED field (place/tier/confidence) — the
# pre-promotion "accumulate divergence evidence" tool, family-invisible. "hm" = the
# promotion step (the challenger serves) — NOT wired yet; "hm" currently behaves as
# "shadow" so the served path stays 100% incumbent until the promotion build + Jonathan's
# gate. Runs WHOLE-or-abort: any challenger failure omits the shadow, never a partial read.
# PHOTO_DECISION_ENGINE = "off"

# Nightly auto-weave (WEAVE_SCOPE slice 3). 08:00 UTC ≈ 2-4am US overnight —
# after the day's memories have settled. Fires the worker `scheduled` handler
# → runNightlyWeave, which pre-assembles the active trip's freshest day into a
# stored weave so the page is already woven when the family next opens the app.
[triggers]
crons = ["0 8 * * *"]

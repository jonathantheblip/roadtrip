<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1714;--bg2:#242019;--card:#2c2620;--text:#e8e0d4;--muted:#9a8e7e;--accent:#c0734a;--accent2:#d4956b;--accent3:#c0734a;--border:#3a332a;--tag:#c0734a;--tagText:#fff;--radius:14px;--personLabel:'Jonathan'}
[data-theme=helen]{--bg:#f5f1ec;--bg2:#eae5dd;--card:#ffffff;--text:#3a3530;--muted:#7a746a;--accent:#6b8f8f;--accent2:#b8956a;--accent3:#6b8f8f;--border:#d4cfc7;--tag:#6b8f8f;--tagText:#fff;--personLabel:'Helen'}
[data-theme=aurelia]{--bg:#fdf0f4;--bg2:#f9e4ec;--card:#ffffff;--text:#3a2030;--muted:#9a7080;--accent:#c2185b;--accent2:#e91e80;--accent3:#c2185b;--border:#f0d0e0;--tag:#c2185b;--tagText:#fff;--personLabel:'Aurelia'}
[data-theme=rafa]{--bg:#0a0e1a;--bg2:#0f1528;--card:#141e30;--text:#e0e8ff;--muted:#8090c0;--accent:#d32f2f;--accent2:#1565c0;--accent3:#fdd835;--border:#1f2a42;--tag:#d32f2f;--tagText:#fff;--personLabel:'Rafa'}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;padding-bottom:80px;transition:background .4s,color .4s}
.app{max-width:500px;margin:0 auto;padding:12px}
header{text-align:center;padding:20px 0 12px}
header h1{font-family:'DM Serif Display',serif;font-size:1.5em;color:var(--accent);transition:color .4s}
header .sub{font-size:.78em;color:var(--muted);margin-top:2px}
.person-bar{display:flex;gap:6px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.person-btn{border:2px solid var(--border);background:var(--bg2);color:var(--muted);padding:8px 16px;border-radius:20px;font-size:.82em;font-weight:600;cursor:pointer;transition:all .3s;font-family:inherit}
.person-btn.active{border-color:var(--accent);color:var(--accent);background:var(--card)}
.person-btn:hover{border-color:var(--accent)}
.filters{display:flex;gap:6px;margin:8px 0 12px;flex-wrap:wrap;padding:2px 0}
.filter-btn{white-space:nowrap;border:1.5px solid var(--border);background:transparent;color:var(--muted);padding:5px 12px;border-radius:16px;font-size:.75em;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;flex-shrink:0}
.filter-btn.active{border-color:var(--accent);color:var(--tagText);background:var(--accent)}
.section-label{font-family:'DM Serif Display',serif;font-size:1.05em;color:var(--accent);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;transition:all .3s}
.card.star{border-left:4px solid var(--accent)}
.card.bucees{border-left:4px solid #fdd835;background:color-mix(in srgb,var(--card) 92%,#fdd835)}
.card-name{font-weight:700;font-size:.92em;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-name a{color:inherit;text-decoration:none}
.star-badge{background:#fdd835;color:#333;font-size:.65em;padding:1px 7px;border-radius:8px;font-weight:700}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.68em;font-weight:600}
.t-helen{background:#2d8a4e;color:#fff}
.t-aurelia{background:#c2185b;color:#fff}
.t-rafa{background:#e65100;color:#fff}
.t-jonathan{background:#1565c0;color:#fff}
.t-everyone{background:#5e35b1;color:#fff}
.t-food{background:#6d4c41;color:#fff}
.t-gas{background:#37474f;color:#fff}
.t-energy{background:#f57f17;color:#fff}
.t-photo{background:#00695c;color:#fff}
.t-viral{background:#ad1457;color:#fff}
.t-poi{background:var(--accent);color:#fff}
.t-bucees{background:#fdd835;color:#333}
.pitch{font-size:.84em;margin:4px 0;line-height:1.4}
.pitch-label{font-weight:700;font-size:.72em;padding:1px 6px;border-radius:6px;margin-right:4px;display:inline-block}
.pl-helen{background:#2d8a4e;color:#fff}
.pl-aurelia{background:#c2185b;color:#fff}
.pl-rafa{background:#e65100;color:#fff}
.pl-jonathan{background:#1565c0;color:#fff}
.card-meta{font-size:.78em;color:var(--muted);margin-top:4px}
.card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.action-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:10px;font-size:.75em;font-weight:600;text-decoration:none;color:var(--tagText);background:var(--accent);transition:opacity .2s;border:none;cursor:pointer;font-family:inherit}
.action-btn:hover{opacity:.85}
.action-btn.waze{background:#33ccff;color:#000}
.action-btn.apple{background:#333;color:#fff}
[data-theme=jonathan] .action-btn.apple{background:#666}
.action-btn.tiktok{background:#000;color:#fff}
.action-btn.google{background:#4285f4;color:#fff}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.day-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.day-header h3{font-family:'DM Serif Display',serif;font-size:1em;color:var(--accent)}
.day-header .dh-sub{font-size:.75em;color:var(--muted);margin-top:2px}
.chev{color:var(--muted);transition:transform .3s;font-size:.9em}
.day-card.open .chev{transform:rotate(180deg)}
.day-body{display:none;padding:0 16px 14px}
.day-card.open .day-body{display:block}
.schedule{width:100%;font-size:.84em;border-collapse:collapse}
.schedule td{padding:6px 0;border-bottom:1px solid var(--border);vertical-align:top}
.schedule td:first-child{width:70px;font-weight:600;color:var(--accent);white-space:nowrap;padding-right:8px}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.team-box{padding:12px;border-radius:10px;font-size:.84em}
.team-box h4{font-family:'DM Serif Display',serif;font-size:.95em;margin-bottom:6px}
.team-girls{background:color-mix(in srgb,var(--card) 85%,#2d8a4e);border:1px solid color-mix(in srgb,var(--border) 70%,#2d8a4e)}
.team-guys{background:color-mix(in srgb,var(--card) 85%,#1565c0);border:1px solid color-mix(in srgb,var(--border) 70%,#1565c0)}
.vibe{font-style:italic;color:var(--muted);font-size:.82em;margin-top:10px;padding:10px 12px;background:var(--bg2);border-radius:8px}
.drive-box{background:var(--bg2);padding:10px 14px;border-radius:8px;font-size:.82em;margin-bottom:12px}
.drive-box strong{color:var(--accent)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:.9em}
.emotional-arc{background:var(--bg2);padding:20px;border-radius:var(--radius);margin:20px 0}
.emotional-arc h3{font-family:'DM Serif Display',serif;color:var(--accent);margin-bottom:10px}
.emotional-arc p{font-size:.84em;margin-bottom:6px;color:var(--muted)}
.emotional-arc p strong{color:var(--text)}
.media-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;margin:24px 0}
.media-title{font-family:'DM Serif Display',serif;font-size:1.15em;color:var(--accent);margin-bottom:14px;letter-spacing:.01em}
.media-category{margin-bottom:18px}
.media-category:last-child{margin-bottom:0}
.media-category h4{font-family:'DM Serif Display',serif;font-size:.92em;color:var(--text);margin-bottom:6px;letter-spacing:.02em}
.media-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.media-link{display:inline-block;padding:6px 12px;border-radius:10px;font-size:.78em;font-weight:600;text-decoration:none;background:var(--card);color:var(--text);border:1px solid var(--border);transition:all .2s}
.media-link:hover{border-color:var(--accent);color:var(--accent)}
.media-note{font-size:.76em;color:var(--muted);margin-top:8px;font-style:italic;line-height:1.45}
.podcast-item{padding:10px 0;border-bottom:1px solid var(--border)}
.podcast-item:last-child{border-bottom:none;padding-bottom:0}
.podcast-name{font-weight:700;font-size:.92em}
.podcast-name a{color:var(--text);text-decoration:none}
.podcast-name a:hover{color:var(--accent)}
.podcast-desc{font-size:.8em;color:var(--muted);margin-top:4px;line-height:1.5}
@media(max-width:420px){.team-grid{grid-template-columns:1fr}.person-btn{padding:6px 12px;font-size:.78em}}
@media print{.person-bar,.filters,.card-actions{display:none}.day-body{display:block!important}}

/* === HELEN: Playfair Display for headings, brass underlines === */
[data-theme=helen] header h1,
[data-theme=helen] .section-label,
[data-theme=helen] .day-header h3,
[data-theme=helen] .emotional-arc h3,
[data-theme=helen] .media-title,
[data-theme=helen] .media-category h4,
[data-theme=helen] .team-box h4{font-family:'Playfair Display',Georgia,serif;letter-spacing:.005em}
[data-theme=helen] .section-label{border-bottom-color:var(--accent2)}
[data-theme=helen] .card.star{border-left-color:var(--accent2)}
[data-theme=helen] .star-badge{background:var(--accent2);color:#fff}

/* === RAFA: bold, chunky, dramatic dark-space look === */
[data-theme=rafa] body{font-weight:500}
[data-theme=rafa] header h1{font-family:'DM Sans',sans-serif;font-weight:900;font-size:1.8em;letter-spacing:-.01em;text-transform:uppercase;color:var(--text)}
[data-theme=rafa] header h1::after{content:'';display:block;height:4px;width:80px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent2) 100%);margin:8px auto 0;border-radius:2px}
[data-theme=rafa] header .sub{color:var(--accent3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:.75em}
[data-theme=rafa] .section-label{font-family:'DM Sans',sans-serif;font-weight:900;font-size:1.15em;text-transform:uppercase;letter-spacing:.02em;color:var(--accent);border-bottom:2px solid var(--accent2);padding-bottom:8px}
[data-theme=rafa] .day-header h3{font-family:'DM Sans',sans-serif;font-weight:900;font-size:1.08em;text-transform:uppercase;letter-spacing:.01em;color:var(--accent3)}
[data-theme=rafa] .card{border-width:1px 1px 1px 5px;border-left-color:var(--accent2)}
[data-theme=rafa] .card.star{border-left-color:var(--accent);box-shadow:0 0 0 1px rgba(211,47,47,.25)}
[data-theme=rafa] .card-name{font-weight:800;font-size:1em;letter-spacing:.01em}
[data-theme=rafa] .star-badge{background:var(--accent3);color:#111}
[data-theme=rafa] .tag{font-weight:800;letter-spacing:.02em;text-transform:uppercase}
[data-theme=rafa] .person-btn{font-weight:800;border-width:2.5px;text-transform:uppercase;letter-spacing:.02em}
[data-theme=rafa] .person-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
[data-theme=rafa] .filter-btn{font-weight:700;text-transform:uppercase;letter-spacing:.02em}
[data-theme=rafa] .filter-btn.active{background:var(--accent2);border-color:var(--accent2)}
[data-theme=rafa] .emotional-arc h3{font-family:'DM Sans',sans-serif;font-weight:900;text-transform:uppercase;color:var(--accent3)}
[data-theme=rafa] .media-title{font-family:'DM Sans',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:.02em;color:var(--accent3);font-size:1.3em}
[data-theme=rafa] .media-category h4{font-family:'DM Sans',sans-serif;font-weight:900;text-transform:uppercase;color:var(--text)}
[data-theme=rafa] .media-link{background:var(--bg2);border-color:var(--accent2);color:var(--text);font-weight:700;text-transform:uppercase;letter-spacing:.02em}
[data-theme=rafa] .media-link:hover{background:var(--accent2);color:#fff;border-color:var(--accent)}
[data-theme=rafa] .action-btn.apple{background:var(--accent);color:#fff}
[data-theme=rafa] .drive-box strong,[data-theme=rafa] .emotional-arc p strong{color:var(--accent3)}
</style>
</head>

<script>
const STOPS=[
// === FRIDAY APR 17 ===

{id:'f2',name:'Zohara Mediterranean Kitchen',day:'fri17',dayLabel:'Fri Apr 17',state:'CT',types:['food'],persons:['helen','jonathan'],address:'59 Raymond Rd, West Hartford, CT 06107',lat:41.763,lng:-72.737,hours:'Lunch & dinner',star:false,cluster:'2hr: West Hartford CT',pitch:{helen:'Roasted cauliflower, falafel, hummus, baba ganoush — reviewers praise the vegetarian depth, not afterthought sides.',jonathan:'The craft behind their mezze spread tells you everything about the kitchen\'s ambition.'},details:'Backup lunch if Pond House is full. Book OpenTable.',vegNotes:'Extensive mezze'},
{id:'f3',name:'Art Omi Sculpture Park',day:'fri17',dayLabel:'Fri Apr 17',state:'NY',types:['poi','photo','energy'],persons:['helen','aurelia','rafa','everyone'],address:'1405 County Rte 22, Ghent, NY 12075',lat:42.332,lng:-73.657,hours:'Daily 9am-5pm (closed Tue)',star:true,cluster:'3hr: Hudson Valley NY',pitch:{helen:'Sixty contemporary sculptures across 120 rolling Hudson Valley acres — where art meets the landscape that inspired the Hudson River School painters.',aurelia:'Giant installations in open fields with mountains behind you — every piece is made for photos. This place IS your feed.'},details:'FREE. Register at artomi.org/visit. 45-60 min. Wide fields for Rafa to run.',vegNotes:'N/A'},
{id:'f4',name:'Olana State Historic Site',day:'fri17',dayLabel:'Fri Apr 17',state:'NY',types:['poi','photo'],persons:['helen','jonathan'],address:'5720 NY-9G, Hudson, NY 12534',lat:42.218,lng:-73.833,hours:'Grounds free dawn-dusk',star:false,cluster:'3hr: Hudson Valley NY',pitch:{helen:'A Persian-style villa with panoramic views of the Catskills and Hudson River that literally inspired Frederic Church.',jonathan:'Church designed every view from this estate like a painting — one of the oldest tourist attractions in America.'},details:'20-30 min for overlook. Grounds only (free). House tours need advance tickets — skip the house.',vegNotes:'N/A'},
// === SATURDAY APR 18 ===
{id:'s1',name:'Steamtown National Historic Site',day:'sat18',dayLabel:'Sat Apr 18',state:'PA',types:['poi'],persons:['rafa','jonathan'],address:'150 S Washington Ave, Scranton, PA 18503',lat:41.408,lng:-75.672,hours:'Daily 9:30am-5pm',star:true,cluster:'2hr: Scranton PA',pitch:{rafa:'One of the BIGGEST trains ever built — it weighs more than a MILLION pounds and you can climb inside the cabs and sit in a real caboose!',jonathan:'A full 40-acre railyard with a restored 1902 roundhouse, massive steam locomotives, and park rangers who bring the Railroad Age to life.'},details:'FREE admission. 45-60 min. Open rail cars are hands-on. Kids 1-10 are mesmerized.',vegNotes:'N/A'},
{id:'s2',name:'Nay Aug Park',day:'sat18',dayLabel:'Sat Apr 18',state:'PA',types:['energy','photo'],persons:['rafa','aurelia'],address:'500 Arthur Ave, Scranton, PA 18510',lat:41.397,lng:-75.647,hours:'Daily 7am-8pm',star:false,cluster:'2hr: Scranton PA',pitch:{rafa:'A TREEHOUSE 150 feet up overlooking a real waterfall and a gorge — plus two playgrounds and a covered bridge!',aurelia:'The covered bridge and gorge overlook are genuinely moody and atmospheric — beautiful shots.'},details:'Free. 20-30 min. 10 min from Steamtown — combine for 60-90 min Scranton stop.',vegNotes:'N/A'},
{id:'s3',name:'The Millworks',day:'sat18',dayLabel:'Sat Apr 18',state:'PA',types:['food','photo'],persons:['helen','aurelia','rafa','jonathan','everyone'],address:'340 Verbeke St, Harrisburg, PA 17102',lat:40.267,lng:-76.886,hours:'Sat 11:30am-10pm',star:true,cluster:'4hr: Harrisburg PA — LUNCH',pitch:{helen:'Farm-to-table surrounded by three art galleries and 18 working artist studios — seasonal grain bowls, wood-fired veggie pizzas, every ingredient locally sourced.',aurelia:'Rooftop biergarten with city views, art studios right next to where you eat — people literally call it AESTHETIC in reviews.'},details:'Walk-ins welcome; reserve for 6+. Kids get clay/crayons. 2 min from Broad Street Market (America\'s oldest farmers\' market).',vegNotes:'Grain bowls, veggie pizzas, farm salads'},
{id:'s4',name:'Meems Bottom Covered Bridge',day:'sat18',dayLabel:'Sat Apr 18',state:'VA',types:['photo','poi'],persons:['jonathan','aurelia','everyone'],address:'Wissler Rd, New Market, VA',lat:38.76,lng:-78.69,hours:'Always open',star:true,cluster:'Between clusters: Virginia',pitch:{jonathan:'Virginia\'s longest covered bridge at 204 feet — a single-span Burr arch truss from 1894, on the National Register.',aurelia:'A real covered bridge over a river with mountains behind — the most classic, beautiful shot on the whole drive.'},details:'5-10 min. Less than 0.5 mi from I-81 Exit 269. Free.',vegNotes:'N/A'},
{id:'s5',name:'Buc-ee\'s Mt. Crawford + Playground',day:'sat18',dayLabel:'Sat Apr 18',state:'VA',types:['gas','food','energy'],persons:['rafa','everyone'],address:'6500 Buc-ee\'s Blvd, Mt. Crawford, VA 22841',lat:38.37,lng:-78.97,hours:'24/7',star:false,cluster:'Between clusters: Virginia',pitch:{rafa:'Rainbow arches playground plus SNACKS at a real Buc-ee\'s — your first Texas preview!',jonathan:'Opened June 2025. Combine with A Dream Come True Playground in Harrisonburg for a 30-min stop.'},details:'Near I-81 Exits 240-247. Playground at 1050 Neff Ave, Harrisonburg. Buc-ee\'s preview before Texas!',vegNotes:'Fruit cups, salads, hummus'},
{id:'s6',name:'Mill Spring Makers Market',day:'sat18',dayLabel:'Sat Apr 18',state:'TN',types:['poi','photo'],persons:['helen','aurelia'],address:'144 E Main St, Jonesborough, TN 37659',lat:36.293,lng:-82.534,hours:'Sat 10am-5pm',star:true,cluster:'Ceremony: Jonesborough TN',pitch:{helen:'The largest collection of locally made goods in East Tennessee — 80+ artisans across 2,500 sq ft. Handmade pottery, jewelry, leather, fiber arts.',aurelia:'Real handmade goods from local artists in Tennessee\'s oldest town — way more authentic than mall shopping.'},details:'For Helen + Aurelia + Rafa while Jonathan is at the ceremony. Adjacent to The Corner Cup for coffee.',vegNotes:'N/A'},
{id:'s7',name:'Red Meze Downtown',day:'sat18',dayLabel:'Sat Apr 18',state:'TN',types:['food'],persons:['helen','everyone'],address:'109 Buffalo St, Johnson City, TN 37604',lat:36.328,lng:-82.353,hours:'Sat 11am-10pm',star:false,cluster:'Dinner: Johnson City TN',pitch:{helen:'Authentic Mediterranean/Turkish with falafel, hummus, lentil soup, grain bowls — real vegetarian depth, not afterthought salads.',jonathan:'The hummus and lamb dishes both get rave reviews — everyone eats well here.'},details:'Kid-friendly. Outstanding reviews.',vegNotes:'Extensive: falafel, hummus, lentil soup, spanakopita, grain bowls'},
// === SUNDAY APR 19 ===
{id:'u1',name:'Coolidge Park Carousel & Bridge',day:'sun19',dayLabel:'Sun Apr 19',state:'TN',types:['energy','photo'],persons:['rafa','aurelia','everyone'],address:'150 River St, Chattanooga, TN 37405',lat:35.061,lng:-85.308,hours:'Carousel 11am-7pm, park dawn-dusk',star:false,cluster:'2.5hr: Chattanooga TN',pitch:{rafa:'A REAL antique carousel from 1894 with 52 hand-carved animals — every ride is only $1 and you pick a different animal each time!',aurelia:'The Walnut Street Bridge with the river and mountains is one of the most photographed spots in Chattanooga — prime content.'},details:'Carousel $1/ride (card only). Free park. 20-40 min.',vegNotes:'N/A'},
{id:'u2',name:'Sluggo\'s Vegan Brunch',day:'sun19',dayLabel:'Sun Apr 19',state:'TN',types:['food'],persons:['helen'],address:'505 Cherokee Blvd, Chattanooga, TN 37405',lat:35.064,lng:-85.320,hours:'Sun brunch till 3pm',star:false,cluster:'2.5hr: Chattanooga TN',pitch:{helen:'Chattanooga\'s original all-vegan restaurant — Sunday brunch with plant-based omelets and Southern comfort food that even meat-eaters rave about.'},details:'100% vegan. Small space — arrive early. Rafa may need backup snacks.',vegNotes:'100% vegan'},
{id:'u3',name:'Barber Vintage Motorsports Museum',day:'sun19',dayLabel:'Sun Apr 19',state:'AL',types:['poi'],persons:['rafa','jonathan','aurelia','helen','everyone'],address:'6030 Barber Motorsports Pkwy, Birmingham, AL 35094',lat:33.533,lng:-86.614,hours:'Sun Noon-6pm',star:true,cluster:'4.5hr: Birmingham AL — ANCHOR',pitch:{rafa:'Over 1,000 shiny motorcycles AND real Lotus race cars stacked FIVE STORIES HIGH — and there\'s a real racetrack right outside!',jonathan:'Guinness World Record holder — 1,800+ bikes from 220 manufacturers across 22 countries, plus the world\'s most extensive Lotus collection.',aurelia:'Five stories of glass and steel with motorcycles displayed like art — the colors and design are genuinely aesthetic and content-worthy.'},details:'$20/adult, $15/child 4-12. Allow 90 min. Look don\'t touch — keep Rafa close. Confirm April 19 is normal operating day.',vegNotes:'N/A'},
{id:'u4',name:'Slice Pizza & Brewhouse',day:'sun19',dayLabel:'Sun Apr 19',state:'AL',types:['food'],persons:['helen','everyone'],address:'725 29th St S, Birmingham, AL 35233',lat:33.508,lng:-86.784,hours:'Sun ~11am-10pm',star:false,cluster:'4.5hr: Birmingham AL',pitch:{helen:'Vegan cheese options, creative veggie combos — one of Birmingham\'s best-rated for plant-based pizza.'},details:'Lakeview neighborhood. Craft beer. Kid-friendly pizza format.',vegNotes:'Vegan cheese, veggie pizzas'},
{id:'u5',name:'Highland Park Carousel',day:'sun19',dayLabel:'Sun Apr 19',state:'MS',types:['energy','poi'],persons:['rafa'],address:'39th Ave, Highland Park, Meridian, MS 39302',lat:32.374,lng:-88.691,hours:'Sun 1-5pm, 50¢/ride',star:false,cluster:'7hr: Meridian MS',pitch:{rafa:'A carousel from 1896 with hand-carved animals — one of only 11 like it in the whole country!'},details:'National Historic Landmark. Call ahead 601-485-1802 — may be closed for renovations. Park has playgrounds regardless.',vegNotes:'N/A'},
// === MONDAY APR 20 ===
{id:'m1',name:'MS Museum of Natural Science — Dinosaur Trail',day:'mon20',dayLabel:'Mon Apr 20',state:'MS',types:['poi','energy'],persons:['rafa','everyone'],address:'2148 Riverside Dr, Jackson, MS 39202',lat:32.320,lng:-90.172,hours:'Mon 8am-5pm',star:true,cluster:'1.5hr: Jackson MS',pitch:{rafa:'SIX life-size 3D dinosaur models — T-Rex, Triceratops, AND Chasmosaurus — plus 12 GIANT robotic Ice Age animals that actually MOVE!',helen:'2.5 miles of peaceful nature trails through Mississippi wetlands, plus a preschool Discovery Room with a treehouse and slide.'},details:'Adults $7, Under 5 FREE (Rafa free!). Ice Age exhibit through Aug 2026. 100,000-gal aquarium. Playground on-site. 1 hr focused visit.',vegNotes:'N/A'},
{id:'m2',name:'Vicksburg National Military Park',day:'mon20',dayLabel:'Mon Apr 20',state:'MS',types:['poi'],persons:['jonathan','rafa'],address:'3201 Clay St, Vicksburg, MS 39183',lat:32.348,lng:-90.850,hours:'Sunrise-sunset, $20/vehicle',star:false,cluster:'3hr: Vicksburg MS',pitch:{jonathan:'One of America\'s most significant Civil War sites — the 47-day siege that split the Confederacy. 1,300+ monuments along a 16-mile self-driving tour.',rafa:'REAL cannons everywhere and a massive Civil War SHIP pulled from the river bottom — you can see actual cannonball holes!'},details:'Abbreviated tour 1-1.5 hrs. America the Beautiful Pass accepted. Download NPS app for audio. Visitor Center may be closed Mon — call 601-636-0583.',vegNotes:'N/A'},
{id:'m3',name:'Vicksburg Riverfront Murals',day:'mon20',dayLabel:'Mon Apr 20',state:'MS',types:['photo'],persons:['aurelia','helen'],address:'Levee St, Vicksburg, MS',lat:32.352,lng:-90.879,hours:'Always open, free',star:false,cluster:'3hr: Vicksburg MS',pitch:{aurelia:'Vibrant colorful mural panels along the Mississippi River floodwall — great for aesthetic photos with the river as backdrop.',helen:'Artist Robert Dafford painted Vicksburg\'s entire history on the floodwall. Tune FM 90.5 for narrated audio.'},details:'15-30 min. Free. Always accessible.',vegNotes:'N/A'},
{id:'m4',name:'Biedenharn Coca-Cola Museum',day:'mon20',dayLabel:'Mon Apr 20',state:'MS',types:['poi','food'],persons:['everyone'],address:'1107 Washington St, Vicksburg, MS 39183',lat:32.349,lng:-90.878,hours:'Mon 9am-5pm',star:false,cluster:'3hr: Vicksburg MS',pitch:{jonathan:'In 1894, Joseph Biedenharn first bottled Coca-Cola right here — the FIRST place in the world. Ice-cold Coke floats in a restored 1890s candy store.',rafa:'ICE CREAM and soda floats in a store that looks like it\'s from a hundred years ago!'},details:'$3.50/adult, Under 6 FREE. 20-30 min.',vegNotes:'Ice cream/floats'},
{id:'m5',name:'Buc-ee\'s Terrell',day:'mon20',dayLabel:'Mon Apr 20',state:'TX',types:['gas','food','viral'],persons:['everyone'],address:'506 W IH 20, Terrell, TX 75160',lat:32.731,lng:-96.228,hours:'24/7',star:true,cluster:'6hr: East Texas — BUC-EE\'S',pitch:{jonathan:'Chopped brisket sandwiches smoked in-house. Beaver Nuggets, fudge, kolaches, cheapest gas on I-20.',aurelia:'Buc-ee\'s is a whole aesthetic experience and viral TikTok stop — beaver merch, wall of candy, fudge counter. Major content.',helen:'Fresh fruit cups, salads, hummus, trail mixes, excellent coffee, and surprisingly well-designed kitschy Texas souvenirs.',rafa:'The store is ENORMOUS and feels like an adventure — walk around with wide eyes looking at everything!'},details:'Plan 30-45 min. ~45 mi east of Kennedale. First Buc-ee\'s in DFW (opened 2015).',vegNotes:'Fruit, salads, hummus, trail mix, coffee'},
// === THURSDAY APR 23 ===
{id:'t1',name:'Collin Street Bakery',day:'thu23',dayLabel:'Thu Apr 23',state:'TX',types:['food','poi'],persons:['everyone'],address:'401 W 7th Ave, Corsicana, TX 75110',lat:32.095,lng:-96.473,hours:'Mon-Sat 7am-5:30pm',star:false,cluster:'1hr: Corsicana TX',pitch:{jonathan:'130-year-old bakery shipping legendary DeLuxe Fruitcake worldwide since 1896 — free samples, 10¢ coffee, and the world\'s best chicken salad.',aurelia:'Historic building with gorgeous bakery cases — decorated cakes that look too pretty to eat.'},details:'Helen: garden salads, soups, deli veggie options. Free cookie for kids under 12. 15-20 min.',vegNotes:'Salads, soups, deli options'},
{id:'t2',name:'Sam\'s Original Restaurant & BBQ',day:'thu23',dayLabel:'Thu Apr 23',state:'TX',types:['food'],persons:['everyone'],address:'390 I-45 E Frontage Rd, Fairfield, TX 75840',lat:31.737,lng:-96.149,hours:'7am-9pm',star:true,cluster:'2.5hr: Fairfield TX — LUNCH',pitch:{jonathan:'Third-generation Texas BBQ since 1953 — 44-foot buffet, 7,000 meals a week. Texas Highways called it essential.',helen:'The enormous salad bar has genuine variety — fresh vegetables, homemade croutons — plus veggie sides: mashed potatoes, green beans, cabbage, corn, cornbread.'},details:'Buffet = no waiting (critical with a 5yo). Homemade pies. 45 min.',vegNotes:'Massive salad bar + multiple veggie sides'},
{id:'t3',name:'Buc-ee\'s Madisonville',day:'thu23',dayLabel:'Thu Apr 23',state:'TX',types:['gas','food','viral'],persons:['everyone'],address:'205 IH-45 S, Madisonville, TX 77864',lat:30.931,lng:-95.904,hours:'24/7',star:true,cluster:'3.5hr: Madisonville TX',pitch:{aurelia:'Your SECOND Buc-ee\'s — same iconic merch, candy walls, fudge counters. Stock up on Beaver Nuggets for the flight home.',rafa:'The store is ENORMOUS and you already know the drill — find the candy wall, report back!'},details:'The ONLY Buc-ee\'s on I-45 between DFW and Houston. #1 restaurant in Madisonville on TripAdvisor. 30-45 min.',vegNotes:'Fruit, salads, hummus, coffee'},
{id:'t4',name:'Sam Houston Statue',day:'thu23',dayLabel:'Thu Apr 23',state:'TX',types:['photo','energy','poi'],persons:['jonathan','aurelia','everyone'],address:'7600 Hwy 75 S, Huntsville, TX 77340',lat:30.644,lng:-95.579,hours:'Mon-Fri 9am-5pm, FREE',star:false,cluster:'4hr: Huntsville TX',pitch:{jonathan:'At 67 feet, "Big Sam" is the tallest statue of an American hero — visible from SIX MILES away on I-45.',aurelia:'A gleaming white giant visible from miles away — 3D version of the face on the walking trail for a killer photo.'},details:'15-20 min. Free. Walking trail for Rafa. Picnic tables.',vegNotes:'N/A'},
// === HOUSTON ARRIVAL / FRIDAY MORNING PLANS (rendered under Thu Apr 23) ===
{id:'hou_rice',name:'Rice University Campus',day:'thu23',dayLabel:'Fri Apr 24 (or Thu evening)',state:'TX',types:['poi','photo'],persons:['aurelia','jonathan','helen','everyone'],address:'6100 Main St, Houston, TX 77005',lat:29.7174,lng:-95.4018,hours:'Campus open daily; park at Greenbriar Lot',star:true,cluster:'Fri 24 morning: Rice + Axiom',pitch:{aurelia:"Your dad and Uncle Chris both went here. The oak-lined paths, Mediterranean Revival architecture, and the Academic Quadrangle are gorgeous — and you might want to go here too someday.",jonathan:"Your campus, redesigned. The Academic Quad got a complete Nelson Byrd Woltz overhaul in 2024. Lovett Hall still stands. The Sallyport still echoes.",helen:"Ralph Adams Cram's 1912 Mediterranean Revival campus with 4,300 trees, 100+ public artworks, and the kind of proportions that make you understand why Jonathan fell in love with architecture here.",rafa:"A HUGE college campus with thousands of trees, giant stone arches to walk through, and echoey whispering rooms in Herzstein Hall!"},details:"Park at Greenbriar Lot ($4/day flat, credit card only). Walk the Sallyport through Lovett Hall. See the redesigned Academic Quad. Herzstein Hall has whispering niches Rafa will love. 2-3 miles from Menil (10 min drive). NOTE: Turrell Skyspace CLOSED until summer 2026 for renovation.",vegNotes:'N/A'},
{id:'hou_axiom',name:"Axiom Space (Chris's private tour)",day:'thu23',dayLabel:'Fri Apr 24 (or Thu evening)',state:'TX',types:['poi'],persons:['rafa','aurelia','jonathan','everyone'],address:'1290 Hercules Ave, Houston, TX 77058',lat:29.5597,lng:-95.0896,hours:'Private tour — by arrangement with Chris',star:true,cluster:'Fri 24 morning: Rice + Axiom',pitch:{rafa:"Uncle Chris works where they BUILD SPACESHIPS. You're going to see a REAL Mission Control Center with REAL screens showing the International Space Station — and the ACTUAL moon suits astronauts will wear on the Moon!",aurelia:"Your uncle works at the company building the replacement for the International Space Station. You'll see a real Mission Control Center — not a museum replica — and the spacesuits designed with Prada for moon missions.",jonathan:"Chris is giving you a private tour of the facility building the world's first commercial space station. Axiom has sent four crewed missions to the ISS and is designing the AxEMU suits for Artemis. This is the real thing.",helen:"A private, behind-the-scenes tour of the company building humanity's next space station. Not a museum — the actual working facility, guided by family."},details:"PRIVATE TOUR — not open to public. Chris will pre-register visitors. Adults need government photo ID. Photography may be restricted. Plan 60-90 min. Located near Johnson Space Center / Space Center Houston — pair with Space Center Houston public exhibits if time allows.",vegNotes:'N/A'},
// === TEX-MEX RESTAURANTS (DFW + HOUSTON) — flexible timing, discoverable via Food filter ===
{id:'tm_don_artemio',name:'Don Artemio',day:null,dayLabel:'DFW · flexible',state:'TX',types:['food'],persons:['helen','jonathan','everyone'],address:'3268 W 7th St, Fort Worth, TX 76107',lat:32.7512,lng:-97.3653,hours:'Mon-Thu 11am-9pm, Fri-Sat 11am-10pm, Sun 10am-8pm',star:true,cluster:'DFW Tex-Mex (flexible Tue-Thu)',pitch:{helen:"James Beard-nominated interior Mexican — the Chile Hojaldrado is cream cheese and pecan-stuffed poblano in puff pastry that's unlike anything you've had at a Mexican restaurant.",jonathan:"The best restaurant in Fort Worth according to basically everyone. Tomahawk steaks and cabrito alongside some of the most inventive Mexican cooking in Texas."},details:"Date-night tier. James Beard-nominated. Reservations recommended.",vegNotes:"Chile Hojaldrado, Chilaquiles Rojos con Burrata, Ensalada de Nopales, squash enchiladas (ask for vegan — pumpkin/squash/carrot sauce)",menuUrl:"https://www.donartemio.us/menus/"},
{id:'tm_meso_maya',name:'Meso Maya Comida y Copas',day:null,dayLabel:'Dallas · flexible',state:'TX',types:['food'],persons:['helen','everyone'],address:'1611 McKinney Ave, Dallas, TX 75202',lat:32.7898,lng:-96.8016,hours:'Mon-Thu 11am-10pm, Fri-Sat 11am-midnight, Sun 11am-10pm',star:false,cluster:'DFW Tex-Mex (flexible Tue-Thu)',pitch:{helen:"Interior Mexican — Oaxaca, Yucatán, Michoacán — with veggie blue corn tacos, budín azteca, and plantain dishes that treat plants as the star, not the understudy.",jonathan:"Generous portions, famous margaritas, and mole dishes made with the seriousness they deserve."},details:"The current Tue dinner pick — already on the Kennedale Tue 21 schedule.",vegNotes:"Veggie blue corn tacos, budín azteca, queso poblano, plantain dishes, Brussels sprouts, substantial salads"},
{id:'tm_cafecito',name:'Cafecito FW',day:null,dayLabel:'Fort Worth · morning',state:'TX',types:['food','photo'],persons:['aurelia','helen'],address:'401 W Magnolia Ave, Fort Worth, TX 76104',lat:32.7311,lng:-97.3359,hours:'Mon-Wed 6:30am-2pm, THU CLOSED, Fri-Sun 7am-8pm',star:true,cluster:'DFW Tex-Mex (flexible Tue-Thu)',pitch:{aurelia:"Pink corn tortillas, pink ceiling, paper flowers, and lanterns on the patio — this place was designed for your camera. The café de olla and marzapan latte are unlike any coffee you've had.",helen:"A family-owned café where the tortillas are handmade and pink, the horchata latte is art, and the papas a la Mexicana feel like someone's abuela made them for you."},details:"Morning/brunch option. CLOSED THURSDAYS — plan for Tue, Wed, Fri, Sat, or Sun.",vegNotes:"Papas a la Mexicana, molletes, nopales salad (limited but genuine)"},
{id:'tm_el_palote',name:'El Palote Panaderia',day:null,dayLabel:'Dallas · flexible',state:'TX',types:['food'],persons:['helen','everyone'],address:'2537 S Buckner Blvd, Dallas, TX 75227',lat:32.7566,lng:-96.6977,hours:'Wed-Sun 11am-8pm, CLOSED Mon-Tue',star:false,cluster:'DFW Tex-Mex (flexible Tue-Thu)',pitch:{helen:"A 100% vegan Mexican bakery and restaurant that's so good Guy Fieri featured it on Diners, Drive-Ins & Dives. Every Tex-Mex staple — birria, barbacoa, al pastor — done plant-based and done right.",jonathan:"I know what you're thinking. But the reviews are unanimous: meat-eaters are won over. The pan dulce alone is worth the drive to Pleasant Grove."},details:"CLOSED Mon-Tue — plan for Wed or Thu. 100% vegan entire menu.",vegNotes:"Entire menu is vegan — birria tacos, barbacoa, al pastor, enchiladas, flautas, tamales, loaded fries, pan dulce bakery"},
{id:'tm_hugos',name:"Hugo's",day:'thu23',dayLabel:'Thu Apr 23',state:'TX',types:['food'],persons:['helen','jonathan','everyone'],address:'1600 Westheimer Rd, Houston, TX 77006',lat:29.7430,lng:-95.3910,hours:'CLOSED MON · Tue-Wed 3-9pm · Thu 11:30am-9pm · Fri 11:30am-11pm · Sat 11am-11pm · Sun 10am-9pm',star:true,cluster:'Houston dinner with Chris & Yvonne',pitch:{helen:"A dedicated 14-item Vegan & Vegetarian menu from a James Beard Award-winning chef — empanadas de plátano, quesadillas de huitlacoche, enchiladas placeras. This is not an afterthought.",jonathan:"Hugo Ortega is the real deal — regional Mexican from a chef who trained in Puebla, Ciudad de México, and Oaxaca. In a 1925 building that feels festive without trying."},details:"Recommended spot for the Thu 7pm dinner with Chris & Yvonne. Reserve ahead.",vegNotes:"14-item dedicated menu: Empanadas de Plátano ($16), Quesadillas de Huitlacoche ($18), Chile Relleno ($20), Huarache with wild mushrooms ($18), Enchiladas Placeras ($20)",menuUrl:"https://www.hugosrestaurant.net/menu/vegan-vegetarian-menu/"},
{id:'tm_candente',name:'Candente',day:null,dayLabel:'Houston · flexible',state:'TX',types:['food'],persons:['jonathan','everyone'],address:'4306 Yoakum Blvd Ste 120, Houston, TX 77006',lat:29.7365,lng:-95.3935,hours:'Mon-Thu 11am-9pm, Fri 11am-10pm, Sat-Sun 10am-9pm',star:false,cluster:'Houston Tex-Mex',pitch:{jonathan:"MICHELIN Guide-listed handcrafted Tex-Mex from The Pit Room team. The brisket enchiladas are legendary and it's practically walking distance from your Airbnb.",helen:"The tortilla soup alone could be a meal, and the sprawling Montrose patio makes it feel like a neighborhood spot, not a restaurant."},details:"Walking distance from the Marshall St Airbnb. Montrose.",vegNotes:"Cheese enchiladas, queso, tortilla soup, sides — less dedicated than Hugo's but vibes are excellent"},
{id:'tm_el_tiempo',name:'El Tiempo Cantina',day:null,dayLabel:'Houston · flexible',state:'TX',types:['food'],persons:['helen','jonathan','everyone'],address:'3130 Richmond Ave, Houston, TX 77098',lat:29.7368,lng:-95.4300,hours:'Sun-Thu 11am-10pm, Fri-Sat 11am-11pm',star:false,cluster:'Houston Tex-Mex',pitch:{helen:"The vegetable fajitas — grilled in olive oil on a dedicated pan, not the meat grill — are the best fajitas a Houston food blogger has ever had. 75 years of Laurenzo family cooking.",jonathan:"This is the Laurenzo family — the lineage that includes the original Ninfa's. The chips with tomatillo sauce, the margaritas, and the fajitas are Houston canon."},details:"Laurenzo family — the lineage behind the original Ninfa's.",vegNotes:"Veggie fajitas (dedicated iron pan, olive oil — NOT cooked on meat grill), cheese enchiladas, sides"},

// === BROWSE-AND-DISCOVER POIs ===
// These appear only when a state filter is active. category:'discover', day:null.
// Source: research report (compass_artifact_wf-*.md), curated for Helen/Aurelia/Rafa taste.

// CONNECTICUT
{id:'d_ct_wadsworth',name:'Wadsworth Atheneum',day:null,state:'CT',types:['poi'],persons:['helen','everyone'],address:'600 Main St, Hartford, CT 06103',hours:'Thu-Fri noon-5pm, Sat-Sun 10am-5pm',star:true,category:'discover',pitch:{helen:"America's oldest continuously operating public art museum \u2014 50,000 works spanning 5,000 years, from Caravaggio and Monet to Dalí, in five connected buildings that run Gothic Revival to Brutalist."},details:'Free for kids under 12. Downtown Hartford, minutes off I-84.'},
{id:'d_ct_yale',name:'Yale University Art Gallery',day:null,state:'CT',types:['poi'],persons:['helen','everyone'],address:'1111 Chapel St, New Haven, CT 06510',hours:'Tue-Sun, free',star:false,category:'discover',pitch:{helen:"The oldest university art museum in the Western Hemisphere \u2014 300,000+ objects, ancient to contemporary, in Louis Kahn's landmark 1953 building. Always free."},details:'Worth the New Haven detour if the I-84/I-91 route runs south.'},
{id:'d_ct_weir',name:'Weir Farm National Historical Park',day:null,state:'CT',types:['poi','energy'],persons:['helen','everyone'],address:'735 Nod Hill Rd, Wilton, CT 06897',hours:'Grounds daily dawn-dusk, free',star:false,category:'discover',pitch:{helen:"The only National Park dedicated to American painting \u2014 J. Alden Weir's 60-acre Impressionist landscape where you can still paint en plein air through the free Take Part in Art program."},details:'Studios, gardens, Weir Pond. Feels like walking into a canvas.'},
{id:'d_ct_gillette',name:'Gillette Castle State Park',day:null,state:'CT',types:['photo','poi'],persons:['aurelia','everyone'],address:'67 River Rd, East Haddam, CT 06423',hours:'Grounds 8am-sunset; castle Memorial Day-Columbus Day',star:false,category:'discover',pitch:{aurelia:"An eccentric medieval-style stone castle built by the actor who played Sherlock Holmes, perched on a hilltop over the Connecticut River. It looks like it belongs in a fantasy movie."},details:'184 acres of trails. The castle itself photographs incredibly.'},
{id:'d_ct_twain',name:'Mark Twain House & Museum',day:null,state:'CT',types:['poi'],persons:['helen','aurelia','everyone'],address:'351 Farmington Ave, Hartford, CT 06105',hours:'Tours daily',star:false,category:'discover',pitch:{helen:"Samuel Clemens's Victorian Gothic mansion with Tiffany-designed interiors \u2014 the rooms where he wrote Huck Finn and Tom Sawyer are peak Gilded Age aesthetic."},details:'Tours fill up; book ahead in summer.'},
{id:'d_ct_mystic',name:'Mystic Seaport Museum',day:null,state:'CT',types:['photo','poi'],persons:['aurelia','everyone'],address:'75 Greenmanville Ave, Mystic, CT 06355',hours:'Daily 10am-5pm',star:false,category:'discover',pitch:{aurelia:"A 19th-century coastal village re-created on 19 acres with the last surviving wooden whaling ship and a working shipyard \u2014 the maritime aesthetic photographs beautifully."},details:'Big if the route is I-95 coastal instead of I-84.'},

// NEW YORK
{id:'d_ny_dia',name:'Dia Beacon',day:null,state:'NY',types:['poi'],persons:['helen','everyone'],address:'3 Beekman St, Beacon, NY 12508',hours:'Fri-Mon 10am-5pm; $25 adults, under 12 free',star:true,category:'discover',pitch:{helen:"Nearly 300,000 sq ft of contemporary art in a repurposed 1929 Nabisco factory \u2014 Richard Serra, Dan Flavin, Donald Judd, Agnes Martin, Louise Bourgeois. Natural skylights flood the vast galleries. A new 8-acre South Garden opens in 2026."},details:'Pair with Beacon Main Street for a half day.'},
{id:'d_ny_stormking',name:'Storm King Art Center',day:null,state:'NY',types:['poi','energy','photo'],persons:['helen','aurelia','everyone'],address:'20 Old Pleasant Hill Rd, New Windsor, NY 12553',hours:'Apr-Nov, timed tickets',star:true,category:'discover',pitch:{helen:"500 acres of monumental sculpture amid Hudson Valley hills \u2014 Calder, di Suvero, Maya Lin, Andy Goldsworthy's 2,728-foot Storm King Wall. Art and landscape become the same thing.",aurelia:"Giant sculpture scattered across hills with mountains as the backdrop \u2014 every piece is a photo."},details:'Plan half a day. Bring water shoes in rain; paths are natural.'},
{id:'d_ny_walkway',name:'Walkway Over the Hudson',day:null,state:'NY',types:['photo','energy'],persons:['aurelia','everyone'],address:'61 Parker Ave, Poughkeepsie, NY 12601',hours:'Daily 7am-sunset, free',star:false,category:'discover',pitch:{aurelia:"The world's longest elevated pedestrian bridge \u2014 1.28 miles across the Hudson, 212 feet above the water. The views in every direction are content."},details:'Free. Great late-afternoon walk.'},
{id:'d_ny_beacon',name:'Beacon Main Street',day:null,state:'NY',types:['poi','food'],persons:['aurelia','everyone'],address:'Main St, Beacon, NY 12508',hours:'Daily; most shops 10am-6pm',star:false,category:'discover',pitch:{aurelia:"A whole arts-hub downtown \u2014 galleries, vintage shops, trendy cafes. Effortlessly cool without trying, basically curated for your feed."},details:'Natural pairing with Dia Beacon.'},
{id:'d_ny_cole',name:'Thomas Cole National Historic Site',day:null,state:'NY',types:['poi'],persons:['helen','everyone'],address:'218 Spring St, Catskill, NY 12414',hours:'Tours May-Oct',star:false,category:'discover',pitch:{helen:"Home and studio of the founder of the Hudson River School, connected to Olana via the Hudson River Skywalk pedestrian bridge. Walking between these two painters' homes is a pilgrimage."},details:'Pair with Olana across the river.'},

// PENNSYLVANIA
{id:'d_pa_longwood',name:'Longwood Gardens',day:null,state:'PA',types:['poi','energy','photo'],persons:['helen','aurelia','everyone'],address:'1001 Longwood Rd, Kennett Square, PA 19348',hours:'Daily, timed tickets ~$25',star:true,category:'discover',pitch:{helen:"One of the world's premier botanical gardens \u2014 1,100 acres, 4.5 acres of conservatories, 5,500 plant varieties, illuminated fountain shows, and an orchid room. Pierre du Pont's life work. The single most Helen stop on the entire trip.",aurelia:"Conservatories, fountain shows, orchid rooms, and the kind of plants that look unreal. Built for the camera."},details:'Timed tickets; buy ahead. Plan 3-4 hours.'},
{id:'d_pa_brandywine',name:'Brandywine River Museum of Art',day:null,state:'PA',types:['poi'],persons:['helen','everyone'],address:'1 Hoffmans Mill Rd, Chadds Ford, PA 19317',hours:'Daily 9:30am-5pm',star:false,category:'discover',pitch:{helen:"Three generations of Wyeth family art in a converted 19th-century gristmill overlooking the Brandywine. Andrew Wyeth's austere landscapes feel different when you're standing in the river valley he painted."},details:'Sculpture garden included.'},
{id:'d_pa_hershey',name:'Hershey Gardens',day:null,state:'PA',types:['poi','energy'],persons:['helen','aurelia','rafa','everyone'],address:'170 Hotel Rd, Hershey, PA 17033',hours:'Daily 9am-5pm',star:false,category:'discover',pitch:{helen:"A 23-acre botanical garden with 3,500+ roses across 275 varieties, themed gardens, and a Butterfly Atrium.",aurelia:"Butterfly Atrium. Need I say more.",rafa:"Butterflies you can walk through plus a giant rose garden and then chocolate world right next door!"},details:'Steps from Hershey Chocolate World for the inevitable detour.'},
{id:'d_pa_capitol',name:'Pennsylvania State Capitol',day:null,state:'PA',types:['poi'],persons:['helen','everyone'],address:'501 N 3rd St, Harrisburg, PA 17120',hours:'Free daily tours',star:false,category:'discover',pitch:{helen:"Teddy Roosevelt called it \"the handsomest building I ever saw.\" The dome is modeled on St. Peter's, the grand staircase on the Paris Op\u00e9ra. Free daily tours. One of the most architecturally magnificent state capitols in the country."},details:'Downtown Harrisburg, pair with The Millworks.'},
{id:'d_pa_lancaster',name:'Lancaster Central Market',day:null,state:'PA',types:['food','poi'],persons:['helen','aurelia','everyone'],address:'23 N Market St, Lancaster, PA 17603',hours:'Tue, Fri, Sat',star:false,category:'discover',pitch:{helen:"America's oldest continuously operating farmers' market \u2014 since the 1730s. Amish and Mennonite vendors under a Romanesque Revival market hall. Great vegetarian grazing."},details:'Only open Tue, Fri, Sat. Plan around the schedule.'},
{id:'d_pa_susquehanna',name:'Susquehanna Art Museum',day:null,state:'PA',types:['poi'],persons:['helen','everyone'],address:'1401 N 3rd St, Harrisburg, PA 17102',hours:'Wed-Sun',star:false,category:'discover',pitch:{helen:"Central Pennsylvania's only dedicated art museum, in a reclaimed bank building with the original vault door preserved as an artistic centerpiece."},details:'Free on Third Fridays. Pair with the State Capitol.'},

// VIRGINIA

function renderYouTube(data,title){
  let h=`<div class="media-section"><h3 class="media-title">${title}</h3>`;
  data.forEach(cat=>{
    h+=`<div class="media-category"><h4>${cat.title}</h4>`;
    if(cat.items&&cat.items.length){
      h+=`<div class="media-links">`;
      cat.items.forEach(i=>h+=`<a class="media-link" href="${i.url}" target="_blank" rel="noopener">${i.label}</a>`);
      h+=`</div>`;
    }
    if(cat.note)h+=`<div class="media-note">${cat.note}</div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

function wazeUrl(stop){
  if(stop.lat!=null&&stop.lng!=null) return `https://waze.com/ul?ll=${stop.lat},${stop.lng}&navigate=yes`;
  return `https://waze.com/ul?q=${encodeURIComponent(stop.address||stop.name)}&navigate=yes`;
}
function appleUrl(addr){return `https://maps.apple.com/?daddr=${encodeURIComponent(addr)}`}
function googleUrl(addr){return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`}
// TikTok: try the app's custom URL scheme first, fall back to the web
// if the app isn't installed. The TikTok mobile site renders search as a
// blank page, so Universal Links via the web URL aren't enough.
function openTikTokSearch(encodedName){
  const name=decodeURIComponent(encodedName);
  const q=encodeURIComponent(name);
  const deepLink='tiktok://search?q='+q;
  const webUrl='https://www.tiktok.com/search?q='+q;

  // If the app intercepts the custom scheme, the PWA/tab becomes hidden.
  // If it doesn't, we're still here after ~1.2s — warn the user the
  // TikTok mobile web page may render blank, then navigate.
  const fallback=setTimeout(()=>{
    if(!document.hidden){
      alert('Opening TikTok search in Safari \u2014 if it looks blank, search for "'+name+'" directly in the TikTok app.');
      window.location.href=webUrl;
    }
  },1200);
  const onHide=()=>{
    if(document.hidden){
      clearTimeout(fallback);
      document.removeEventListener('visibilitychange',onHide);
    }
  };
  document.addEventListener('visibilitychange',onHide);

  window.location.href=deepLink;
}

function navLinks(stop){
  const p=activePerson;
  let h='';
  if(stop.address&&stop.address!=='N/A'){
    if(p==='jonathan') h+=`<a class="action-btn waze" href="${wazeUrl(stop)}" target="_blank">Waze</a>`;
    else if(p==='helen') h+=`<a class="action-btn apple" href="${appleUrl(stop.address)}" target="_blank">Apple Maps</a>`;
    else if(p==='aurelia'){h+=`<button type="button" class="action-btn tiktok" onclick="openTikTokSearch('${encodeURIComponent(stop.name)}')">TikTok</button>`;h+=`<a class="action-btn apple" href="${appleUrl(stop.address)}" target="_blank">Maps</a>`;}
    else if(p==='rafa') h+=`<a class="action-btn apple" href="${appleUrl(stop.address)}" target="_blank">Maps</a>`;
    else h+=`<a class="action-btn google" href="${googleUrl(stop.address)}" target="_blank">Maps</a>`;
  }
  return h;
}

function renderPitches(stop){
  const p=activePerson;
  let h='';
  if(p==='everyone'||p==='all'){
    for(const k of['helen','aurelia','rafa','jonathan']){
      if(stop.pitch[k]) h+=`<p class="pitch"><span class="pitch-label pl-${k}">${k[0].toUpperCase()+k.slice(1)}</span> ${stop.pitch[k]}</p>`;
    }
  } else {
    if(stop.pitch[p]) h+=`<p class="pitch">${stop.pitch[p]}</p>`;
    // Show one other relevant pitch
    for(const k of['helen','aurelia','rafa','jonathan']){

function renderStop(stop){
  const isBucees=stop.name.toLowerCase().includes('buc-ee');
  let cls='card';
  if(stop.star)cls+=' star';
  if(isBucees)cls+=' bucees';
  let h=`<div class="${cls}">`;
  h+=`<div class="card-name">${stop.name}`;
  if(stop.star)h+=` <span class="star-badge">TOP PICK</span>`;
  h+=`</div>`;
  h+=`<div class="tags">`;
  stop.persons.forEach(p=>{if(p!=='everyone')h+=`<span class="tag t-${p}">${p[0].toUpperCase()+p.slice(1)}</span>`});
  if(stop.persons.includes('everyone'))h+=`<span class="tag t-everyone">Everyone</span>`;
  stop.types.forEach(t=>h+=`<span class="tag t-${t}">${t[0].toUpperCase()+t.slice(1)}</span>`);
  h+=`</div>`;
  h+=renderPitches(stop);
  if(stop.details)h+=`<div class="card-meta">${stop.details}</div>`;
  if(stop.vegNotes&&stop.vegNotes!=='N/A'&&(activePerson==='helen'||activePerson==='everyone'))h+=`<div class="card-meta" style="color:#2d8a4e">Vegetarian: ${stop.vegNotes}</div>`;
  const nav=navLinks(stop);
  if(nav)h+=`<div class="card-actions">${nav}</div>`;
  h+=`</div>`;
  return h;
}

function filterStops(){
  return STOPS.filter(s=>{
    if(filterDay!=='all'&&s.day!==filterDay)return false;
    if(filterState!=='all'&&s.state!==filterState)return false;
    if(filterType!=='all'&&!s.types.includes(filterType))return false;
    if(activePerson!=='everyone'&&activePerson!=='jonathan'&&!s.persons.includes(activePerson)&&!s.persons.includes('everyone'))return false;
    return true;
  });
}

function getTitle(){
  const p=activePerson;
  if(p==='helen')return 'Our Road Trip';
  if(p==='aurelia')return 'Road Trip \uD83C\uDFD0\u2728';
  if(p==='rafa')return 'ROAD TRIP!! \uD83E\uDD96\uD83D\uDD77';
  return 'Jackson Family Road Trip';
}

function getSub(){
  const p=activePerson;
  if(p==='helen')return 'April 17\u201324, 2026';
  if(p==='aurelia')return 'apr 17-24 \u00b7 belmont to texas \u00b7 lets gooo';
  if(p==='rafa')return 'WE ARE GOING TO TEXAS!!!';
  return 'April 17\u201324, 2026 \u00b7 Belmont \u2192 Texas \u2192 Home';
}

function render(){
  document.body.setAttribute('data-theme',activePerson==='everyone'?'jonathan':activePerson);
  const meta=document.querySelector('meta[name=theme-color]');
  if(meta){
    const themes={jonathan:'#1a1714',helen:'#f5f1ec',aurelia:'#fdf0f4',rafa:'#0a0e1a'};
    meta.content=themes[activePerson]||themes.jonathan;
  }

  const stops=filterStops();
  const isFiltered=filterDay!=='all'||filterState!=='all'||filterType!=='all';

  let h=`<header><h1>${getTitle()}</h1><div class="sub">${getSub()}</div></header>`;

  // Person selector
  h+=`<div class="person-bar">`;
  PERSONS.forEach(p=>{
    const lbl=(activePerson==='aurelia'||activePerson==='rafa')?`${p.emoji} ${p.l}`:p.l;
    h+=`<button class="person-btn ${activePerson===p.k?'active':''}" onclick="setPerson('${p.k}')">${lbl}</button>`;
  });
  h+=`</div>`;

  // Filters — Day
  h+=`<div class="filters">`;
  h+=`<button class="filter-btn ${filterDay==='all'?'active':''}" onclick="setFilter('day','all')">All Days</button>`;
  DAYS_ORDER.forEach(d=>{h+=`<button class="filter-btn ${filterDay===d?'active':''}" onclick="setFilter('day','${d}')">${DAY_LABELS[d]}</button>`});
  h+=`</div>`;
  // Filters — State
  h+=`<div class="filters">`;
  h+=`<button class="filter-btn ${filterState==='all'?'active':''}" onclick="setFilter('state','all')">All States</button>`;
  STATES_ORDER.forEach(s=>{h+=`<button class="filter-btn ${filterState===s?'active':''}" onclick="setFilter('state','${s}')">${s}</button>`});
  h+=`</div>`;
  // Filters — Type
  h+=`<div class="filters">`;
  h+=`<button class="filter-btn ${filterType==='all'?'active':''}" onclick="setFilter('type','all')">All Types</button>`;
  TYPES_ORDER.forEach(t=>{h+=`<button class="filter-btn ${filterType===t.k?'active':''}" onclick="setFilter('type','${t.k}')">${t.l}</button>`});
  h+=`</div>`;

  // Render stops grouped by day
  if(!isFiltered){
    // Show full itinerary with day groupings
    let currentCluster='';
    const grouped={};
    stops.forEach(s=>{if(!grouped[s.day])grouped[s.day]=[];grouped[s.day].push(s)});

    DAYS_ORDER.forEach(day=>{
      if(day==='thu23')return; // rendered below under its own "Drive to Houston" header
      // Check for Kennedale structured days
      const kd=KENNEDALE_DAYS.find(k=>k.day===day);
      if(kd){h+=renderKennedaleDay(kd);return;}

      const dayStops=grouped[day];
      if(!dayStops||dayStops.length===0)return;

      const first=dayStops[0];
      h+=`<div class="section-label">${first.dayLabel}</div>`;
      let curCluster='';
      dayStops.forEach(s=>{
        if(s.cluster!==curCluster){curCluster=s.cluster;h+=`<div style="font-size:.78em;color:var(--muted);font-weight:600;margin:10px 0 4px">${curCluster}</div>`}
        h+=renderStop(s);
      });
    });

    // Thursday Houston drive
    const thuStops=grouped['thu23'];
    if(thuStops&&thuStops.length>0){
      h+=`<div class="section-label">Thu Apr 23 — Drive to Houston</div>`;
      let curCluster='';
      thuStops.forEach(s=>{
        if(s.cluster!==curCluster){curCluster=s.cluster;h+=`<div style="font-size:.78em;color:var(--muted);font-weight:600;margin:10px 0 4px">${curCluster}</div>`}
        h+=renderStop(s);
      });
    }

    // Media section — per-person content feeds
    if(activePerson==='rafa') h+=renderYouTube(YOUTUBE_RAFA,'WATCH ON THE ROAD \uD83E\uDD96\uD83D\uDD77\uD83D\uDD25');
    else if(activePerson==='aurelia') h+=renderYouTube(YOUTUBE_AURELIA,'watch list \u2728');
    else if(activePerson==='helen'||activePerson==='jonathan') h+=renderPodcasts();

    // Emotional arc
    h+=`<div class="emotional-arc"><h3>The Emotional Arc</h3>`;
    h+=`<p><strong>Friday:</strong> Departure. Excitement. The cabin.</p>`;
    h+=`<p><strong>Saturday:</strong> The ceremony. Grief and beauty. The cabin is shelter.</p>`;
    h+=`<p><strong>Sunday:</strong> Long push south. Barber Museum resets everything.</p>`;
    h+=`<p><strong>Monday:</strong> Dinosaurs, Vicksburg, Buc-ee's. Arriving at Aunt Donna's.</p>`;
    h+=`<p><strong>Tue\u2013Wed:</strong> Play. Everyone gets to be themselves.</p>`;
    h+=`<p><strong>Thursday:</strong> Goodbye Donna. Hello Houston and Chris.</p>`;
    h+=`<p><strong>Friday:</strong> The Rothko Chapel. Then home.</p>`;
    h+=`<p style="margin-top:10px;font-style:italic;color:var(--accent)">The trip begins with an ending and closes with a beginning.</p>`;
    h+=`</div>`;
  } else {
    // Filtered view — flat list, with planned vs discover split when state is active
    if(stops.length===0){
      h+=`<div class="empty">No stops match these filters.</div>`;
    } else if(filterState!=='all'){
      const planned=stops.filter(s=>s.category!=='discover');
      const discover=stops.filter(s=>s.category==='discover');
      const stateName={MA:'Massachusetts',CT:'Connecticut',NY:'New York',PA:'Pennsylvania',VA:'Virginia',TN:'Tennessee',AL:'Alabama',MS:'Mississippi',LA:'Louisiana',TX:'Texas'}[filterState]||filterState;
      if(planned.length){
        h+=`<div class="section-label">On the Itinerary \u2014 ${stateName}</div>`;
        planned.forEach(s=>h+=renderStop(s));
      }
      if(discover.length){
        h+=`<div class="section-label">Discover \u2014 ${stateName}</div>`;
        h+=`<div style="font-size:.78em;color:var(--muted);margin:-4px 0 10px;font-style:italic">Off-itinerary picks tuned to whoever's browsing. Tap to navigate if you find time to detour.</div>`;
        discover.forEach(s=>h+=renderStop(s));
      }
    } else {
      stops.forEach(s=>h+=renderStop(s));
    }
  }

  document.getElementById('app').innerHTML=h;
}

function setPerson(p){activePerson=p;render();window.scrollTo(0,0)}
function setFilter(type,val){
  if(type==='day')filterDay=val;
  if(type==='state')filterState=val;
  if(type==='type')filterType=val;
  render();
}

render();

// Register service worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
